kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
kubeadmConfigPatches:
- |
  kind: ClusterConfiguration
  apiServer:
    extraArgs:
      service-node-port-range: "1-65535"
nodes:
- role: control-plane
  extraPortMappings:
  - containerPort: 80
    hostPort: 8080
    listenAddress: "127.0.0.1"
    protocol: TCP
  - containerPort: 443
    hostPort: 8443
    listenAddress: "127.0.0.1"
    protocol: TCP
  - containerPort: 8200
    hostPort: 8200
    listenAddress: "127.0.0.1"
    protocol: TCP
  - containerPort: 3000
    hostPort: 3000
    listenAddress: "127.0.0.1"
    protocol: TCP
  - containerPort: 9090
    hostPort: 9090
    listenAddress: "127.0.0.1"
    protocol: TCP
  - containerPort: 3100
    hostPort: 3100
    listenAddress: "127.0.0.1"
    protocol: TCP
- role: worker

